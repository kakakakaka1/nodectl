{{define "install_script_modal.html"}}
<style>
    .script-modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        z-index: 3000;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity 0.2s ease;
    }

    .script-modal-overlay.active {
        display: flex;
        opacity: 1;
    }

    .script-modal-card {
        background: #ffffff;
        width: 100%;
        max-width: 600px;
        padding: 0;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        transform: scale(0.95);
        transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        overflow: hidden;
        border: 1px solid #e5e5ea;
    }

    .script-modal-overlay.active .script-modal-card {
        transform: scale(1);
    }

    .script-header {
        padding: 16px 20px;
        border-bottom: 1px solid #f0f0f5;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #fafbfc;
    }

    .script-title {
        font-size: 16px;
        color: #1d1d1f;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .script-body {
        padding: 20px;
        background: #ffffff;
        overflow-y: auto;
        max-height: calc(85vh - 140px);
    }

    /* 协议选择区样式 */
    .protocol-selector {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }

    .protocol-selector label {
        display: inline-block;
        cursor: pointer;
        user-select: none;
    }

    .protocol-selector input[type="checkbox"] {
        display: none;
    }

    .protocol-label-btn {
        background: #f4f5f7;
        color: #555;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        border: 1px solid #e1e4e8;
        transition: all 0.2s ease;
    }

    .protocol-selector input[type="checkbox"]:checked+.protocol-label-btn {
        background: #f0f7ff;
        color: #007aff;
        border-color: #007aff;
    }

    .protocol-selector input[type="checkbox"]:hover+.protocol-label-btn {
        border-color: #c6cbd1;
    }

    .protocol-selector input[type="checkbox"]:checked:hover+.protocol-label-btn {
        border-color: #0062cc;
        color: #0062cc;
    }

    /* ====== 协议分组行内展开 ====== */
    .proto-groups-wrap {
        margin-bottom: 16px;
    }

    .proto-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin-bottom: 7px;
    }

    .proto-row-label {
        font-size: 11px;
        font-weight: 700;
        color: #666;
        min-width: 46px;
        flex-shrink: 0;
        padding-top: 5px;
        text-align: right;
        letter-spacing: 0.2px;
    }

    .proto-row-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        flex: 1;
    }

    /* 单变种协议合并行 */
    .proto-singles-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding-top: 8px;
        margin-top: 2px;
        border-top: 1px dashed #e1e4e8;
    }

    .variant-check-item {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        cursor: pointer;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        color: #444;
        background: #f4f5f7;
        border: 1px solid #e1e4e8;
        transition: all 0.15s;
        user-select: none;
    }

    .variant-check-item:hover {
        background: #eef4ff;
        border-color: #b3d1ff;
        color: #0062cc;
    }

    .variant-check-item input[type="checkbox"] {
        width: 13px;
        height: 13px;
        margin: 0;
        cursor: pointer;
        accent-color: #007aff;
    }

    .variant-check-item:has(input:checked) {
        background: #e8f2ff;
        border-color: #007aff;
        color: #007aff;
    }

    /* 代码框样式 */
    .cmd-box {
        background: #f6f8fa;
        border-radius: 8px;
        padding: 18px;
        border: 1px solid #e1e4e8;
        position: relative;
    }

    .cmd-text {
        font-family: "JetBrains Mono", Consolas, Monaco, monospace;
        font-size: 13px;
        line-height: 1.6;
        color: #24292e;
        word-break: break-all;
        white-space: pre-wrap;
    }

    /* 浅色主题语法高亮 */
    .hl-cmd {
        color: #d73a49;
        font-weight: 600;
    }

    /* 命令 bash/curl */
    .hl-string {
        color: #032f62;
    }

    /* 字符串 */
    .hl-param {
        color: #005cc5;
    }

    /* 参数 -c --report */
    .hl-proto {
        color: #22863a;
    }

    /* 协议名 */
    .hl-id {
        color: #032f62;
        font-weight: 600;
    }

    /* Install ID */

    .script-footer {
        padding: 16px 20px;
        border-top: 1px solid #f0f0f5;
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        background: #fafbfc;
    }

    .btn-script-copy {
        background: #007aff;
        color: #fff;
        border: none;
        padding: 8px 20px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .btn-script-copy:hover {
        background: #0062cc;
    }

    .btn-script-cancel {
        background: #fff;
        color: #555;
        border: 1px solid #d1d5da;
        padding: 8px 20px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn-script-cancel:hover {
        background: #f6f8fa;
        color: #333;
    }

    /* ✨ 移动端适配：统一弹窗宽度留白与代码框内边距 */
    @media (max-width: 768px) {
        .script-modal-card {
            max-width: 95%;
            /* 强制两边留出 2.5% 的呼吸空间 */
        }

        .cmd-box {
            padding: 12px;
            /* 手机端适当缩减代码框的内边距，让出更多显示空间 */
        }

        .protocol-selector {
            gap: 8px;
            /* 手机端协议按钮间距微调 */
        }
    }
</style>

<div class="script-modal-overlay" id="installScriptModal">
    <div class="script-modal-card">
        <div class="script-header">
            <div class="script-title">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" style="color: #007aff;">
                    <polyline points="4 17 10 11 4 5"></polyline>
                    <line x1="12" y1="19" x2="20" y2="19"></line>
                </svg>
                部署命令生成
            </div>
        </div>

        <div class="script-body">
            <!-- 协议分组折叠面板，由 JS 动态渲染 -->
            <div class="proto-groups-wrap" id="protocolCheckboxes"></div>

            <div class="cmd-box">
                <div class="cmd-text" id="installCmdDisplay"></div>
            </div>
        </div>

        <div class="script-footer">
            <button class="btn-script-cancel" onclick="closeScriptModal()">关闭</button>
            <button class="btn-script-copy" onclick="copyScriptCmd()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                </svg>
                一键复制
            </button>
        </div>
    </div>
</div>

<script>
    const scriptModal = document.getElementById('installScriptModal');
    const cmdDisplay  = document.getElementById('installCmdDisplay');
    const groupsWrap  = document.getElementById('protocolCheckboxes');
    let currentScriptNode = null;

    // ─── 协议分组定义 ───
    const protoGroups = [
        {
            id: 'vless', name: 'VLESS',
            variants: [
                { key: 'vless',      arg: 'vless',      label: 'Reality' },
                { key: 'vless_wst',  arg: 'vless-wst',  label: 'WS-TLS' },
                { key: 'vless_hut',  arg: 'vless-hut',  label: 'HU-TLS' },
            ]
        },
        {
            id: 'vmess', name: 'VMess',
            variants: [
                { key: 'vmess_tcp',  arg: 'vmess-tcp',  label: 'TCP' },
                { key: 'vmess_ws',   arg: 'vmess-ws',   label: 'WS' },
                { key: 'vmess_http', arg: 'vmess-http', label: 'HTTP' },
                { key: 'vmess_quic', arg: 'vmess-quic', label: 'QUIC' },
                { key: 'vmess_wst',  arg: 'vmess-wst',  label: 'WS-TLS' },
                { key: 'vmess_hut',  arg: 'vmess-hut',  label: 'HU-TLS' },
            ]
        },
        {
            id: 'ss', name: 'Shadowsocks',
            variants: [
                { key: 'ss',   arg: 'shadowsocks', label: 'Shadowsocks' },
            ]
        },
        {
            id: 'hy2', name: 'Hysteria2',
            variants: [
                { key: 'hy2',  arg: 'hysteria2',   label: 'Hysteria2' },
            ]
        },
        {
            id: 'tuic', name: 'TUIC',
            variants: [
                { key: 'tuic', arg: 'tuic',         label: 'TUIC' },
            ]
        },
        {
            id: 'socks5', name: 'Socks5',
            variants: [
                { key: 'socks5', arg: 'socks5',     label: 'Socks5' },
            ]
        },
        {
            id: 'trojan', name: 'Trojan',
            variants: [
                { key: 'trojan',     arg: 'trojan',      label: 'Trojan' },
                { key: 'trojan_wst', arg: 'trojan-wst',  label: 'WS-TLS' },
                { key: 'trojan_hut', arg: 'trojan-hut',  label: 'HU-TLS' },
            ]
        },
    ];

    // ─── 渲染协议面板（行内展开，无折叠）───
    function renderGroups(activeSet) {
        groupsWrap.innerHTML = '';

        const multiGroups  = protoGroups.filter(g => g.variants.length > 1);
        const singleGroups = protoGroups.filter(g => g.variants.length === 1);

        // 多变种协议：每组独占一行，左侧显示协议名标签
        for (const group of multiGroups) {
            const rowEl = document.createElement('div');
            rowEl.className = 'proto-row';
            rowEl.innerHTML = `
                <span class="proto-row-label">${group.name}</span>
                <div class="proto-row-chips">
                    ${group.variants.map(v => `
                        <label class="variant-check-item">
                            <input type="checkbox" value="${v.arg}"
                                ${activeSet.has(v.key) ? 'checked' : ''}
                                onchange="updateScriptCmd()">
                            <span>${v.label}</span>
                        </label>
                    `).join('')}
                </div>
            `;
            groupsWrap.appendChild(rowEl);
        }

        // 单变种协议：全部合并到最后一行
        if (singleGroups.length > 0) {
            const singlesEl = document.createElement('div');
            singlesEl.className = 'proto-singles-row';
            singlesEl.innerHTML = singleGroups.map(g => {
                const v = g.variants[0];
                return `
                    <label class="variant-check-item">
                        <input type="checkbox" value="${v.arg}"
                            ${activeSet.has(v.key) ? 'checked' : ''}
                            onchange="updateScriptCmd()">
                        <span>${g.name}</span>
                    </label>
                `;
            }).join('');
            groupsWrap.appendChild(singlesEl);
        }
    }

    // ─── 打开弹窗 ───
    function openScriptModal(uuid) {
        currentScriptNode = window.allNodesData[uuid];
        if (!currentScriptNode) return;

        if (!currentScriptNode.install_id) {
            alert("该节点未生成 InstallID，请先编辑保存一次");
            return;
        }

        // 解析已启用的协议 key 集合
        const activeSet = new Set();
        if (currentScriptNode.links) {
            const disabledSet = new Set(currentScriptNode.disabled_links || []);
            Object.keys(currentScriptNode.links).forEach(k => {
                if (!disabledSet.has(k)) activeSet.add(k);
            });
        }

        renderGroups(activeSet);
        updateScriptCmd();
        scriptModal.classList.add('active');
    }

    // ─── 生成命令 ───
    function updateScriptCmd() {
        if (!currentScriptNode) return;

        let host = window.panelUrl || window.location.origin;
        host = host.replace(/\/+$/, "");

        const checkedBoxes = groupsWrap.querySelectorAll('input[type="checkbox"]:checked');
        const selectedArgs = Array.from(checkedBoxes).map(cb => cb.value);

        const protosHtml = selectedArgs.map(p => `<span class="hl-proto">${p}</span>`).join(" ");
        const protosRaw  = selectedArgs.join(" ");

        const scriptUrl = `${host}/api/public/install-script?id=${currentScriptNode.install_id}`;

        const cmdHtml = `<span class="hl-cmd">bash</span> <span class="hl-param">-c</span> <span class="hl-string">"$(curl -fsSL ${scriptUrl})"</span> <span class="hl-param">--</span> ${protosHtml}`;
        const rawCmd  = `bash -c "$(curl -fsSL ${scriptUrl})" -- ${protosRaw}`;

        cmdDisplay.innerHTML = cmdHtml;
        cmdDisplay.setAttribute('data-clipboard-text', rawCmd);
    }

    function closeScriptModal() {
        scriptModal.classList.remove('active');
    }

    function copyScriptCmd() {
        const text = cmdDisplay.getAttribute('data-clipboard-text');
        navigator.clipboard.writeText(text).then(() => {
            const btn = document.querySelector('.btn-script-copy');
            const originalHtml = btn.innerHTML;
            btn.style.background = '#34c759';
            btn.innerHTML = '复制成功!';
            setTimeout(() => {
                btn.style.background = '#007aff';
                btn.innerHTML = originalHtml;
            }, 1500);
        });
    }
</script>
{{end}}
