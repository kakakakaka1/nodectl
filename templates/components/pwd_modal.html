{{define "pwd_modal.html"}}
<style>
    /* ================= 统一弹窗基础框架 ================= */
    .pwd-modal-overlay {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
        z-index: 2000; align-items: center; justify-content: center;
        opacity: 0; transition: opacity 0.3s ease;
    }
    .pwd-modal-overlay.active { display: flex; opacity: 1; }
    
    /* 统一尺寸：定宽 420px */
    .pwd-modal-card {
        background: #ffffff; width: 100%; max-width: 420px; border-radius: 12px; 
        box-shadow: 0 20px 40px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden;
        transform: scale(0.95); transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .pwd-modal-overlay.active .pwd-modal-card { transform: scale(1); }

    /* 统一 Header 样式与指示器 */
    .pwd-header { 
        background: #f5f5f7; border-bottom: 1px solid #e5e5ea; 
        padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; 
    }
    .pwd-title { font-size: 15px; font-weight: 600; color: #333; margin: 0; }
    
    /* 右上角状态指示器 */
    .pwd-save-indicator {
        font-size: 12px; font-weight: 600; color: #34c759; opacity: 0; transition: opacity 0.3s;
        display: flex; align-items: center; gap: 4px;
    }

    /* 主内容区 */
    .pwd-body { padding: 30px 25px; background: #fff; }

    /* 表单输入组 */
    .pwd-input-group { margin-bottom: 20px; }
    .pwd-input-group:last-child { margin-bottom: 0; }
    .pwd-input-group label { 
        display: block; font-size: 12px; font-weight: 600; color: #86868b; 
        margin-bottom: 8px; text-transform: uppercase;
    }
    .pwd-input {
        width: 100%; padding: 10px 12px; border: 1px solid #d1d1d6; border-radius: 8px;
        font-size: 14px; color: #1d1d1f; outline: none; transition: 0.2s; background: #fafbfc; box-sizing: border-box;
    }
    .pwd-input:focus { border-color: #007aff; background: #fff; box-shadow: 0 0 0 2px rgba(0,122,255,0.1); }

    /* 统一 Footer 样式 */
    .pwd-footer { 
        padding: 15px 25px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 12px; background: #fff;
    }
    .btn-pwd-cancel { 
        background: #f5f5f7; border: none; color: #333; padding: 8px 22px; border-radius: 8px; 
        cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s;
    }
    .btn-pwd-cancel:hover { background: #e5e5ea; }
    .btn-pwd-submit { 
        background: #007aff; border: none; color: white; padding: 8px 22px; border-radius: 8px; 
        cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.2s;
    }
    .btn-pwd-submit:hover { background: #0062cc; }
    .btn-pwd-submit:disabled { background: #aacdfa; cursor: not-allowed; }

    /* ✨ 移动端适配：统一弹窗宽度留白 */
    @media (max-width: 768px) {
        .pwd-modal-card { 
            max-width: 95%; /* 强制两边留出 2.5% 的呼吸空间 */
        }
    }
</style>

<div class="pwd-modal-overlay" id="pwdModal">
    <div class="pwd-modal-card">
        <div class="pwd-header">
            <div class="pwd-title">修改管理员账号 / 密码</div>
            <div class="pwd-save-indicator" id="pwdIndicator">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg>
                修改成功
            </div>
        </div>
        
        <form id="pwdForm" onsubmit="submitPwdChange(event)">
            <div class="pwd-body">
                <div class="pwd-input-group">
                    <label>当前账号</label>
                    <input type="text" id="oldUsername" class="pwd-input" placeholder="输入当前管理员账号" autocomplete="username" required>
                </div>

                <div class="pwd-input-group">
                    <label>新账号（可选）</label>
                    <input type="text" id="newUsername" class="pwd-input" placeholder="不修改可留空，长度 3-64" autocomplete="username">
                </div>

                <div class="pwd-input-group">
                    <label>当前密码</label>
                    <input type="password" id="oldPwd" class="pwd-input" placeholder="输入当前使用的密码" autocomplete="current-password" required>
                </div>
                
                <div class="pwd-input-group">
                    <label>新密码（可选）</label>
                    <input type="password" id="newPwd" class="pwd-input" placeholder="不修改可留空；如需修改至少 5 位" autocomplete="new-password" minlength="5">
                </div>
                
                <div class="pwd-input-group">
                    <label>确认新密码（可选）</label>
                    <input type="password" id="confirmPwd" class="pwd-input" placeholder="如修改密码请再次输入" autocomplete="new-password" minlength="5">
                </div>

                <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
                
                <div class="pwd-input-group" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0;">
                    <div>
                        <label style="margin-bottom: 4px;">重置 JWT 密钥</label>
                        <span style="font-size: 12px; color: #86868b;">强制所有已登录设备下线</span>
                    </div>
                    <button type="button" class="btn-pwd-cancel" style="color: #ff3b30; background: #ffe5e5;" onclick="resetJWTSecret()">重置密钥</button>
                </div>
            </div>

            <div class="pwd-footer">
                <button type="button" class="btn-pwd-cancel" onclick="closePwdModal()">取消</button>
                <button type="submit" class="btn-pwd-submit" id="pwdSubmitBtn">确认修改</button>
            </div>
        </form>
    </div>
</div>

<script>
    const pwdModalEl = document.getElementById('pwdModal');
    
    // 点击遮罩层关闭
    pwdModalEl.addEventListener('click', function(e) {
        if (e.target === pwdModalEl) closePwdModal();
    });

    function openPwdModal() {
        pwdModalEl.classList.add('active');
        document.getElementById('pwdForm').reset();
        document.getElementById('pwdIndicator').style.opacity = '0';
        
        const btn = document.getElementById('pwdSubmitBtn');
        btn.disabled = false;
        btn.innerText = '确认修改';

        // 临时隐藏右上角下拉菜单防止 z-index 遮挡问题
        const dropdown = document.querySelector('.dropdown-content');
        if(dropdown) {
            dropdown.style.display = 'none';
            setTimeout(() => { dropdown.style.display = ''; }, 100);
        }
        
        setTimeout(() => document.getElementById('oldUsername').focus(), 100);
    }

    function closePwdModal() {
        pwdModalEl.classList.remove('active');
    }

    async function resetJWTSecret() {
        if (!confirm("确定要重置 JWT 密钥吗？这将会导致所有已登录的设备（包括当前设备）立即下线，需要重新登录。")) {
            return;
        }
        
        const indicator = document.getElementById('pwdIndicator');
        indicator.style.opacity = '0';
        
        try {
            const response = await fetch('/api/reset-jwt', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            
            if (data.status === 'success') {
                indicator.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg> 重置成功，即将登出...`;
                indicator.style.opacity = '1';
                setTimeout(() => { window.location.href = '/login'; }, 1500);
            } else {
                indicator.innerHTML = `<span style="color:#ff3b30;">${data.message || '重置失败'}</span>`;
                indicator.style.opacity = '1';
            }
        } catch (err) {
            indicator.innerHTML = `<span style="color:#ff3b30;">网络请求失败</span>`;
            indicator.style.opacity = '1';
        }
    }

    async function submitPwdChange(e) {
        e.preventDefault();
        const btn = document.getElementById('pwdSubmitBtn');
        const indicator = document.getElementById('pwdIndicator');
        const oldUsername = document.getElementById('oldUsername').value.trim();
        const newUsername = document.getElementById('newUsername').value.trim();
        const oldPwd = document.getElementById('oldPwd').value;
        const newPwd = document.getElementById('newPwd').value;
        const confirmPwd = document.getElementById('confirmPwd').value;
        const hasUsernameChange = newUsername.length > 0;
        const hasPasswordChange = newPwd.length > 0 || confirmPwd.length > 0;

        indicator.style.opacity = '0'; // 请求前重置状态

        if (!oldUsername) {
            indicator.innerHTML = `<span style="color:#ff3b30;">请输入当前账号</span>`;
            indicator.style.opacity = '1';
            return;
        }

        if (!hasUsernameChange && !hasPasswordChange) {
            indicator.innerHTML = `<span style="color:#ff3b30;">请至少修改账号或密码中的一项</span>`;
            indicator.style.opacity = '1';
            return;
        }

        if (hasUsernameChange) {
            if (newUsername.length < 3 || newUsername.length > 64) {
                indicator.innerHTML = `<span style="color:#ff3b30;">新账号长度需在 3-64 位之间</span>`;
                indicator.style.opacity = '1';
                return;
            }
            if (/\s/.test(newUsername)) {
                indicator.innerHTML = `<span style="color:#ff3b30;">新账号不能包含空格</span>`;
                indicator.style.opacity = '1';
                return;
            }
        }

        if (hasPasswordChange) {
            if (newPwd !== confirmPwd) {
                indicator.innerHTML = `<span style="color:#ff3b30;">两次新密码不一致</span>`;
                indicator.style.opacity = '1';
                return;
            }
            if (newPwd.length < 5) {
                indicator.innerHTML = `<span style="color:#ff3b30;">新密码长度不能小于 5 位</span>`;
                indicator.style.opacity = '1';
                return;
            }
        }

        if (!oldPwd) {
            indicator.innerHTML = `<span style="color:#ff3b30;">请输入当前密码</span>`;
            indicator.style.opacity = '1';
            return;
        }

        btn.disabled = true;
        btn.innerText = '提交中...';

        try {
            const response = await fetch('/api/change-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    old_username: oldUsername,
                    new_username: newUsername,
                    old_password: oldPwd,
                    new_password: newPwd,
                    confirm_password: confirmPwd
                })
            });
            const data = await response.json();
            
            if (data.status === 'success') {
                // 成功时显示绿色打勾并延迟跳转
                indicator.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"></path></svg> 修改成功，即将登出...`;
                indicator.style.opacity = '1';
                setTimeout(() => { window.location.href = '/login'; }, 1500);
            } else {
                // 失败时直接在右上角显示红色错误文字
                indicator.innerHTML = `<span style="color:#ff3b30;">${data.message || '修改失败'}</span>`;
                indicator.style.opacity = '1';
                btn.disabled = false;
                btn.innerText = '确认修改';
            }
        } catch (err) {
            indicator.innerHTML = `<span style="color:#ff3b30;">网络请求失败</span>`;
            indicator.style.opacity = '1';
            btn.disabled = false;
            btn.innerText = '确认修改';
        }
    }
</script>
{{end}}
