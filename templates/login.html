<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Nodectl</title>

    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23007aff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><rect x='2' y='2' width='20' height='8' rx='2' ry='2'></rect><rect x='2' y='14' width='20' height='8' rx='2' ry='2'></rect><line x1='6' y1='6' x2='6.01' y2='6'></line><line x1='6' y1='18' x2='6.01' y2='18'></line></svg>">
    <link rel="stylesheet" href="/static/css/app.css">
</head>

<body class="login-page">
    <div class="login-card">
        <div class="header">
            <h1>Nodectl</h1>
            <p>登录以管理您的节点网络</p>
        </div>

        {{if .Error}}
        <div class="error-msg">
            {{.Error}}
        </div>
        {{end}}

        <form method="POST" action="/login">
            <div class="input-group">
                <input type="text" id="username" name="username" placeholder="用户名" required autocomplete="username">
            </div>
            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="密码" required
                    autocomplete="current-password">
            </div>
            <button type="submit" class="btn-submit">继续</button>
        </form>
    </div>
</body>

</html>
