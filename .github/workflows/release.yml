name: Build, Release and Publish Docker

# 触发条件：手动触发 (workflow_dispatch)
on:
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (必须以 v 开头，例如: v0.3.0)'
        required: true
        default: 'v0.3.0'

permissions:
  contents: write
  packages: write

jobs:
  # ==========================================
  # 阶段 1: 交叉编译 Go 二进制文件并注入版本号
  # ==========================================
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false # 关闭缓存，彻底解决 tar 解压失败导致报错退出的 bug

      - name: Build Binary
        env:
          CGO_ENABLED: 0 
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p bin
          # 动态注入版本号到 internal/version.Version 变量中
          go build -trimpath -ldflags="-s -w -X 'nodectl/internal/version.Version=${{ github.event.inputs.version }}'" -o bin/nodectl-${{ matrix.goos }}-${{ matrix.goarch }} ./main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goarch }}
          path: bin/nodectl-${{ matrix.goos }}-${{ matrix.goarch }}

  # ==========================================
  # 阶段 2: 发布到 GitHub Releases
  # ==========================================
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all compiled binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: bin
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: bin/*
          generate_release_notes: true

  # ==========================================
  # 阶段 3: 打包并推送到 GitHub Packages (GHCR)
  # ==========================================
  docker:
    name: Build and Push Docker Image
    needs: release # [核心修改] 将依赖从 build 改为了 release，实现串行执行
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all compiled binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: bin
          merge-multiple: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # 使用自带的 TOKEN，免配置

      - name: Convert Repository Name to Lowercase
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: . 
          file: .github/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}:latest
            ghcr.io/${{ env.REPO_LC }}:${{ github.event.inputs.version }}
          # 添加 OCI 标签，向 GHCR 声明此镜像与本仓库绑定，从而放行 GITHUB_TOKEN 写入权限
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}